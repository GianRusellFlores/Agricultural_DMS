<!DOCTYPE html>
<html>
<head>

<title>Documents</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Documents</h2>

<a href="/dashboard" class="btn btn-secondary">
Dashboard
</a>

<a href="/upload_document" class="btn btn-primary">
Upload Document
</a>

<hr>

<table class="table table-striped table-bordered">

<tr>

<th>ID</th>
<th>Title</th>
<th>Description</th>
<th>Category</th>
<th>File</th>
<th>Date</th>
<th>Action</th>

</tr>

{% for doc in documents %}

<tr>

<td>{{ doc[0] }}</td>

<td>{{ doc[1] }}</td>

<td>{{ doc[2] }}</td>

<td>{{ doc[3] }}</td>

<td>{{ doc[4] }}</td>

<td>{{ doc[5] }}</td>

<td>

<a href="/download/{{ doc[0] }}"
class="btn btn-success btn-sm">
Download
</a>

{% if session['role'] == 'admin' %}

<a href="/delete_document/{{ doc[0] }}"
class="btn btn-danger btn-sm"
onclick="return confirm('Delete document?')">
Delete
</a>

{% endif %}

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
