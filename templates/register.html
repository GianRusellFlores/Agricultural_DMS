<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f8f4;
}

.logo{
    width:120px;
}

.title{
    color:#1B5E20;
    font-weight:bold;
}

.card{
    border-radius:15px;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="text-center mb-3">

<img src="{{ url_for('static',
filename='images/logo.png') }}"
class="logo">

<h3 class="title">
Office of the City Agriculturist
</h3>

<h5>Laoag City</h5>

</div>

<div class="card">

<div class="card-header bg-success text-white">
User Registration
</div>

<div class="card-body">

<form method="POST">

<input type="text"
       name="fullname"
       class="form-control mb-3"
       placeholder="Full Name"
       required>

<input type="text"
       name="username"
       class="form-control mb-3"
       placeholder="Username"
       required>

<input type="email"
       name="email"
       class="form-control mb-3"
       placeholder="Email"
       required>

<input type="password"
       name="password"
       class="form-control mb-3"
       placeholder="Password"
       required>

<button class="btn btn-success w-100">
Register
</button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
