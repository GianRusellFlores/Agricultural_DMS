<!DOCTYPE html>
<html>
<head>

<title>Activity Logs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Activity Logs</h2>

<a href="/dashboard"
class="btn btn-secondary">
Dashboard
</a>

<hr>

<table class="table table-bordered">

<tr>

<th>User</th>
<th>Action</th>
<th>Document</th>
<th>IP Address</th>
<th>Date</th>

</tr>

{% for log in logs %}

<tr>

<td>{{ log[0] }}</td>

<td>{{ log[1] }}</td>

<td>{{ log[2] }}</td>

<td>{{ log[3] }}</td>

<td>{{ log[4] }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
