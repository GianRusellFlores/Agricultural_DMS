<!DOCTYPE html>
<html>
<head>
    <title>OCA Laoag City - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f8f4;
        }

        .card{
            border-radius:15px;
            box-shadow:0 3px 15px rgba(0,0,0,0.1);
        }

        .logo{
            width:120px;
        }

        .btn-login{
            background:#2E7D32;
            color:white;
        }

        .btn-login:hover{
            background:#1B5E20;
            color:white;
        }

        .title{
            color:#1B5E20;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="text-center mb-3">

<img src="{{ url_for('static', filename='images/logo.png') }}"
     class="logo">

<h3 class="title">
Office of the City Agriculturist
</h3>

<h5>Laoag City</h5>

<p>Document Management System</p>

</div>

<div class="card">

<div class="card-header bg-success text-white">
    Login
</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">
<label>Username</label>
<input type="text"
       name="username"
       class="form-control"
       required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password"
       name="password"
       class="form-control"
       required>
</div>

<button class="btn btn-login w-100">
Login
</button>

</form>

<hr>

<div class="text-center">
<a href="/register">
Create Account
</a>
</div>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
